<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Fond dégradé -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <!-- Lueur indigo -->
    <radialGradient id="glow" cx="50%" cy="48%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <!-- Lueur ambre du point -->
    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cercle de fond -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Lueur centrale -->
  <circle cx="256" cy="245" r="200" fill="url(#glow)"/>

  <!-- Globe : cercle principal -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.25"/>

  <!-- Globe : méridiens stylisés -->
  <ellipse cx="256" cy="256" rx="80" ry="140" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.15"/>
  <ellipse cx="256" cy="256" rx="30" ry="140" fill="none" stroke="#818cf8" stroke-width="0.8" opacity="0.1"/>

  <!-- Globe : équateur -->
  <ellipse cx="256" cy="256" rx="140" ry="40" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.15"/>

  <!-- La vague : arc principal qui traverse le globe -->
  <path d="M 80 270 Q 140 220, 200 255 T 320 240 T 432 260" 
        fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Vague secondaire (écho) -->
  <path d="M 95 290 Q 155 245, 210 275 T 325 260 T 420 278" 
        fill="none" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Points participants le long de la vague (de gauche à droite, de plus transparent à opaque) -->
  <!-- Passé : points discrets -->
  <circle cx="120" cy="258" r="3" fill="#818cf8" opacity="0.2"/>
  <circle cx="150" cy="245" r="3" fill="#818cf8" opacity="0.25"/>
  <circle cx="180" cy="248" r="3.5" fill="#818cf8" opacity="0.3"/>
  <circle cx="210" cy="258" r="3.5" fill="#818cf8" opacity="0.35"/>

  <!-- Actif : points plus visibles -->
  <circle cx="240" cy="252" r="4" fill="#a5b4fc" opacity="0.5"/>
  <circle cx="270" cy="244" r="4" fill="#a5b4fc" opacity="0.6"/>

  <!-- Point principal : le participant (ambre) -->
  <circle cx="300" cy="242" r="20" fill="url(#amberGlow)"/>
  <circle cx="300" cy="242" r="6" fill="#fbbf24" opacity="0.9"/>
  <circle cx="300" cy="242" r="3" fill="#fef3c7"/>

  <!-- Futur : points à venir -->
  <circle cx="340" cy="248" r="3" fill="#6366f1" opacity="0.15"/>
  <circle cx="370" cy="256" r="2.5" fill="#6366f1" opacity="0.1"/>
  <circle cx="395" cy="262" r="2" fill="#6366f1" opacity="0.08"/>

  <!-- Texte "TheWave" -->
  <text x="256" y="380" text-anchor="middle" 
        font-family="Inter, system-ui, -apple-system, sans-serif" 
        font-size="52" font-weight="200" fill="white" 
        letter-spacing="10" opacity="0.9">TheWave</text>

  <!-- Sous-titre -->
  <text x="256" y="412" text-anchor="middle" 
        font-family="Inter, system-ui, -apple-system, sans-serif" 
        font-size="14" font-weight="300" fill="#c7d2fe" 
        letter-spacing="4" opacity="0.5">UNE HOLA PLANÉTAIRE</text>
</svg>
